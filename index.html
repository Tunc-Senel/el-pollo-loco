<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>El Pollo Locco</title>

        <!-- FAVICONS -->

        <!-- AUTOREN-STYLESHEET -->
        <link rel="stylesheet" type="text/css" href="./style.css">
       
    </head>

    <body>

        <h1>
            El Pollo Locco
        </h1>

        <div class="game-container">
            <canvas id="canvas" width="720" height="480"></canvas>

            <div id="gameControls" class="game-controls d-none">
                <button class="control-button" id="soundButton">
                    <img src="assets/img/favicons/audio.png" alt="Sound">
                </button>

                <button class="control-button" id="settingsButton">
                    <img src="assets/img/favicons/settings.png" alt="Settings">
                </button>

                <button class="control-button" id="pauseButton">
                    <img src="assets/img/favicons/pause.png" alt="Pause">
                </button>

                <button class="control-button" id="fullscreenButton">
                    <img src="assets/img/favicons/fullscreen.png" alt="Fullscreen">
                </button>
            </div>

            <div id="startScreen" class="start-screen">
                <button class="start-button">START GAME</button>
            </div>
        </div>
        
         <!-- AUTOREN-JAVASCRIPT -->
        <script src="./classes/drawable-object.class.js"></script>
        <script src="./classes/movable-object.class.js"></script>
        <script src="./classes/character.class.js"></script>
        <script src="./classes/chicken.class.js"></script>
        <script src="./classes/small-chicken.class.js"></script>
        <script src="./classes/coin.class.js"></script>
        <script src="./classes/bottle.class.js"></script>
        <script src="./classes/cloud.class.js"></script>
        <script src="./classes/status-bar.class.js"></script>
        <script src="./classes/health-bar.class.js"></script>
        <script src="./classes/coin-bar.class.js"></script>
        <script src="./classes/bottle-bar.class.js"></script>
        <script src="./classes/endboss-health-bar.class.js"></script>
        <script src="./classes/endboss.class.js"></script>
        <script src="./classes/game-state.class.js"></script>
        <script src="./classes/audio-manager.class.js"></script>
        <script src="./classes/endscreen.class.js"></script>
        <script src="./classes/world.class.js"></script>
        <script src="./classes/background-object.class.js"></script>
        <script src="./classes/keyboard.class.js"></script>
        <script src="./classes/level.class.js"></script>
        <script src="./classes/throwable-object.class.js"></script>
        <script src="./levels/level1.js"></script>
        <script src="./js/game.js" defer></script>

    </body>

</html>
